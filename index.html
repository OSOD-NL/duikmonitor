  <title>Duikmonitor</title>

  <!-- Duikmonitor icoon. De paden gaan uit van de bestanden in de hoofdmap (de root). -->

  <!-- WebClip, iPhone en iPad beginscherm. -->

  <!-- Naam onder het WebClip-icoon op het beginscherm -->

  <!-- PWA manifest, voor installeerbare webapp -->
  <link rel="manifest" href="/site.webmanifest">
  <style>
    /* THEME TOKENS START
       Eén bron van waarheid voor alle schermkleuren. Twee modi: night en day.
       Componentregels mogen GEEN ruwe kleuren bevatten, alleen var(--token).
       De contrast-zelftest en de lint lezen uit dit blok. */
    html[data-theme="night"]{
      color-scheme:dark;
      --radius:16px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --fontweight-boost:0;

      --page-bg:#0f172a;
      --page-bg2:#1e293b;
      --page-glow1:rgba(96,165,250,.14);
      --page-glow2:rgba(34,197,94,.08);

      --text-main:#f3f4f6;
      --text-heading:#e5edff;
      --text-label:#cbd5e1;
      --text-muted:#94a3b8;
      --text-note:#cbd5e1;
      --text-accent:#93c5fd;
      --text-kpi:#f8fafc;

      --surface-card:linear-gradient(135deg,#1f2937 0%,#111827 100%);
      --surface-soft:rgba(15,23,42,.52);
      --surface-soft-hi:rgba(15,23,42,.62);
      --surface-soft-lo:rgba(15,23,42,.38);
      --surface-solid:#0f172a;
      --surface-inset:rgba(2,6,23,.30);
      --surface-header:rgba(15,23,42,.96);
      --surface-bottom:rgba(15,23,42,.97);
      --surface-navbtn:#111827;
      --surface-hint-info:var(--surface-soft-hi);

      --line-soft:rgba(148,163,184,.22);
      --line-mid:rgba(148,163,184,.26);
      --line-input:#475569;
      --line-input-user:#52627a;

      --field-bg:#0b1220;
      --field-user-bg:#14233a;
      --field-placeholder:#64748b;
      --focus-ring:rgba(96,165,250,.18);
      --required-bg:linear-gradient(135deg,rgba(244,114,182,.042),rgba(20,35,58,.96));
      --required-text:#f3f4f6;
      --required-border:rgba(244,114,182,.34);

      --brand:#60a5fa;
      --brand-border:rgba(96,165,250,.7);

      --btn-bg:#1f2937;
      --btn-text:#f3f4f6;
      --btn-border:#475569;
      --btn-ghost-bg:rgba(15,23,42,.55);

      --btn-primary-bg:rgba(96,165,250,.2);--btn-primary-text:#dbeafe;--btn-primary-border:rgba(96,165,250,.7);
      --btn-good-bg:rgba(34,197,94,.18);--btn-good-text:#bbf7d0;--btn-good-border:rgba(74,222,128,.55);
      --btn-warn-bg:rgba(251,191,36,.20);--btn-warn-text:#fde68a;--btn-warn-border:rgba(251,191,36,.60);
      --btn-bad-bg:rgba(248,113,113,.20);--btn-bad-text:#fecaca;--btn-bad-border:rgba(248,113,113,.62);

      --pill-ok-bg:rgba(34,197,94,.16);--pill-ok-text:#bbf7d0;--pill-ok-border:rgba(74,222,128,.28);
      --pill-warn-bg:rgba(251,191,36,.16);--pill-warn-text:#fde68a;--pill-warn-border:rgba(251,191,36,.30);
      --pill-bad-bg:rgba(248,113,113,.16);--pill-bad-text:#fecaca;--pill-bad-border:rgba(248,113,113,.30);
      --pill-neutral-bg:rgba(148,163,184,.14);--pill-neutral-text:#cbd5e1;--pill-neutral-border:rgba(148,163,184,.24);
      --pill-local-bg:rgba(96,165,250,.12);--pill-local-text:#bfdbfe;--pill-local-border:rgba(96,165,250,.34);
      --pill-live-bg:rgba(34,197,94,.20);--pill-live-text:#bbf7d0;--pill-live-border:rgba(74,222,128,.55);

      --tab-bg:rgba(17,24,39,.72);--tab-border:rgba(148,163,184,.26);
      --tab-active-bg:rgba(96,165,250,.18);--tab-active-text:#dbeafe;--tab-active-border:rgba(96,165,250,.65);
      --tab-live-bg:rgba(56,189,248,.22);--tab-live-text:#bae6fd;--tab-live-border:rgba(56,189,248,.70);

      --hint-bg:rgba(96,165,250,.10);--hint-text:#dbeafe;
      --okbox-bg:rgba(34,197,94,.16);--okbox-text:#bbf7d0;--okbox-line:#4ade80;
      --warnbox-bg:rgba(251,191,36,.16);--warnbox-text:#fde68a;--warnbox-line:#fbbf24;
      --badbox-bg:rgba(248,113,113,.16);--badbox-text:#fecaca;--badbox-line:#f87171;

      --air-line:rgba(96,165,250,.22);--air-head-text:#dbeafe;
      --next-bg:rgba(96,165,250,.12);--next-border:rgba(96,165,250,.28);
      --next-due-bg:rgba(251,191,36,.16);--next-due-border:rgba(251,191,36,.42);--next-due-text:#fde68a;
      --next-over-bg:rgba(248,113,113,.16);--next-over-border:rgba(248,113,113,.42);--next-over-text:#fecaca;
      --fold-summary-text:#dbeafe;--fold-plus-border:rgba(96,165,250,.45);--fold-plus-text:#bfdbfe;--fold-minus-border:rgba(251,191,36,.55);--fold-minus-text:#fde68a;
      --info-summary-bg:rgba(148,163,184,.08);--info-summary-border:rgba(148,163,184,.30);--info-summary-text:#9fb0c7;
      --info-open-bg:rgba(96,165,250,.10);--info-open-border:rgba(96,165,250,.36);--info-open-text:#bfdbfe;
      --row-hover:rgba(96,165,250,.06);--selection:rgba(96,165,250,.35);
      --shadow:0 16px 36px rgba(0,0,0,.32);--shadow-header:0 10px 28px rgba(0,0,0,.35);--shadow-bottom:0 -10px 28px rgba(0,0,0,.35);
      --locked-bg:rgba(2,6,23,.30);--locked-text:#e2e8f0;--locked-border:rgba(148,163,184,.22);
      --intro-live-line:rgba(56,189,248,.65);--intro-plan-line:rgba(96,165,250,.50);
    }
    /* Dag/Buiten: operationele leesmodus. Effen vlakken, donkere tekst op licht,
       duidelijke randen, harde statuskleuren. Geen gloed/gradient onder tekst. */
    html[data-theme="day"]{
      color-scheme:light;
      --radius:16px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --fontweight-boost:0;

      --page-bg:#ffffff;
      --page-bg2:#ffffff;
      --page-glow1:transparent;
      --page-glow2:transparent;

      --text-main:#0f172a;
      --text-heading:#0b1220;
      --text-label:#1f2937;
      --text-muted:#334155;
      --text-note:#1f2937;
      --text-accent:#1d4ed8;
      --text-kpi:#000000;

      --surface-card:#ffffff;
      --surface-soft:#ffffff;
      --surface-soft-hi:#ffffff;
      --surface-soft-lo:#f4f7fb;
      --surface-solid:#ffffff;
      --surface-inset:#f1f5f9;
      --surface-header:#ffffff;
      --surface-bottom:#ffffff;
      --surface-navbtn:#e2e8f0;
      --surface-hint-info:#f1f5f9;

      --line-soft:#94a3b8;
      --line-mid:#94a3b8;
      --line-input:#64748b;
      --line-input-user:#475569;

      --field-bg:#ffffff;
      --field-user-bg:#ffffff;
      --field-placeholder:#475569;
      --focus-ring:rgba(29,78,216,.28);
      --required-bg:#fff1f2;
      --required-text:#0f172a;
      --required-border:#be123c;

      --brand:#1d4ed8;
      --brand-border:#1d4ed8;

      --btn-bg:#ffffff;
      --btn-text:#0f172a;
      --btn-border:#64748b;
      --btn-ghost-bg:#eef2f7;

      --btn-primary-bg:#1d4ed8;--btn-primary-text:#ffffff;--btn-primary-border:#1d4ed8;
      --btn-good-bg:#dcfce7;--btn-good-text:#04432a;--btn-good-border:#15803d;
      --btn-warn-bg:#fef3c7;--btn-warn-text:#6b3008;--btn-warn-border:#b45309;
      --btn-bad-bg:#fee2e2;--btn-bad-text:#7f1d1d;--btn-bad-border:#b91c1c;

      --pill-ok-bg:#dcfce7;--pill-ok-text:#04432a;--pill-ok-border:#15803d;
      --pill-warn-bg:#fef3c7;--pill-warn-text:#6b3008;--pill-warn-border:#b45309;
      --pill-bad-bg:#fee2e2;--pill-bad-text:#58151c;--pill-bad-border:#b91c1c;
      --pill-neutral-bg:#e2e8f0;--pill-neutral-text:#1f2937;--pill-neutral-border:#94a3b8;
      --pill-local-bg:#dbeafe;--pill-local-text:#0b3a8f;--pill-local-border:#1d4ed8;
      --pill-live-bg:#dcfce7;--pill-live-text:#04432a;--pill-live-border:#15803d;

      --tab-bg:#e2e8f0;--tab-border:#94a3b8;
      --tab-active-bg:#1d4ed8;--tab-active-text:#ffffff;--tab-active-border:#1d4ed8;
      --tab-live-bg:#0369a1;--tab-live-text:#ffffff;--tab-live-border:#0369a1;

      --hint-bg:#eef4ff;--hint-text:#0b3a8f;
      --okbox-bg:#dcfce7;--okbox-text:#04432a;--okbox-line:#15803d;
      --warnbox-bg:#fef3c7;--warnbox-text:#6b3008;--warnbox-line:#b45309;
      --badbox-bg:#fee2e2;--badbox-text:#7f1d1d;--badbox-line:#b91c1c;

      --air-line:#94a3b8;--air-head-text:#0b3a8f;
      --next-bg:#dbeafe;--next-border:#1d4ed8;
      --next-due-bg:#fef3c7;--next-due-border:#b45309;--next-due-text:#6b3008;
      --next-over-bg:#fee2e2;--next-over-border:#b91c1c;--next-over-text:#7f1d1d;
      --fold-summary-text:#0b3a8f;--fold-plus-border:#1d4ed8;--fold-plus-text:#0b3a8f;--fold-minus-border:#b45309;--fold-minus-text:#6b3008;
      --info-summary-bg:#e2e8f0;--info-summary-border:#94a3b8;--info-summary-text:#1f2937;
      --info-open-bg:#dbeafe;--info-open-border:#1d4ed8;--info-open-text:#0b3a8f;
      --row-hover:#eef4ff;--selection:rgba(29,78,216,.25);
      --shadow:0 8px 20px rgba(15,23,42,.12);--shadow-header:0 6px 16px rgba(15,23,42,.10);--shadow-bottom:0 -6px 16px rgba(15,23,42,.10);
      --locked-bg:#f1f5f9;--locked-text:#0f172a;--locked-border:#94a3b8;
      --intro-live-line:#0369a1;--intro-plan-line:#1d4ed8;
    }
    /* THEME TOKENS END */
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;color:var(--text-main);font-family:var(--sans);}
    html{background:var(--page-bg);}
    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top left, var(--page-glow1), transparent 32%),
        radial-gradient(circle at bottom right, var(--page-glow2), transparent 28%),
        linear-gradient(135deg,var(--page-bg) 0%,var(--page-bg2) 100%);
    }
    header{
      position:sticky;top:0;z-index:50;
      background:var(--surface-header);
      color:var(--text-main);
      border-bottom:1px solid var(--line-soft);
      box-shadow:var(--shadow-header);
      backdrop-filter:blur(12px);
    }
    .topbar{
      display:flex;gap:12px;align-items:center;justify-content:space-between;
      padding:12px max(16px,env(safe-area-inset-left)) 10px max(16px,env(safe-area-inset-right));
      flex-wrap:wrap;
    }
    .title{display:flex;flex-direction:column;gap:2px;min-width:0}
    .title h1{font-size:18px;line-height:1.1;margin:0;font-weight:850;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-accent)}
    .title small{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tabs{display:flex;overflow-x:auto;gap:8px;padding:0 max(12px,env(safe-area-inset-left)) 10px max(12px,env(safe-area-inset-right));scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{
      border:1px solid var(--tab-border);
      background:var(--tab-bg);
      color:var(--text-main);
      border-radius:999px;
      padding:9px 12px;
      font-size:13px;
      white-space:nowrap;
      cursor:pointer;
      transition:.18s ease;
    }
    .tab:hover{border-color:var(--tab-active-border);color:var(--tab-active-text)}
    .tab.active{
      background:var(--tab-active-bg);
      color:var(--tab-active-text);
      border-color:var(--tab-active-border);
      font-weight:800;
    }
    main{max-width:1280px;margin:0 auto;padding:16px max(12px,env(safe-area-inset-left)) 32px max(12px,env(safe-area-inset-right));}
    .screen{display:none}.screen.active{display:block}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
    .card{
      background:var(--surface-card);
      border:1px solid var(--line-soft);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
    }
    .card h2,.card h3{margin:0 0 10px 0;color:var(--text-heading)}
    .card h2{font-size:20px}.card h3{font-size:16px}
    .muted{color:var(--text-muted)}
    .small{font-size:12px}.note{font-size:13px;line-height:1.45;color:var(--text-note)}
    .headline{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;margin:0 0 10px 0;width:100%}
    .headline h2,.headline h3{margin:0!important;min-width:0;flex:1 1 auto}
    details.info{display:block;position:relative;margin:-2px 0 0 auto;flex:0 0 auto}
    details.info>summary{
      list-style:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
      width:20px;height:20px;min-width:20px;border-radius:999px;
      border:1px solid var(--info-summary-border);background:var(--info-summary-bg);
      color:var(--info-summary-text);font-weight:900;font-size:11px;line-height:1;user-select:none;
    }
    details.info>summary::after{content:"";position:absolute;inset:-8px;border-radius:999px}
    details.info>summary::-webkit-details-marker{display:none}
    details.info[open]>summary{border-color:var(--info-open-border);background:var(--info-open-bg);color:var(--info-open-text)}
    details.info>.info-body{
      margin-top:8px;padding:10px 12px;border-radius:12px;border:1px solid var(--line-soft);
      background:var(--surface-hint-info);color:var(--text-note);font-size:13px;line-height:1.45;
      max-width:min(720px,calc(100vw - 48px));
    }
    .divehead>div:first-child{flex:1 1 auto;min-width:0}
    .span12{grid-column:span 12}.span8{grid-column:span 8}.span6{grid-column:span 6}.span4{grid-column:span 4}.span3{grid-column:span 3}
    label{display:block;font-size:12px;font-weight:800;color:var(--text-label);margin:0 0 5px 0}
    input,select,textarea{
      width:100%;
      font:inherit;
      border:1px solid var(--line-input);
      border-radius:11px;
      padding:10px 11px;
      background:var(--field-bg);
      color:var(--text-main);
      min-height:40px;
      outline:none;
    }
    input.user,select.user,textarea.user{background:var(--field-user-bg);border-color:var(--line-input-user)}
    input:focus,select:focus,textarea:focus{
      border-color:var(--brand);
      box-shadow:0 0 0 3px var(--focus-ring);
    }
    input::placeholder,textarea::placeholder{color:var(--field-placeholder)}
    textarea{min-height:72px;resize:vertical}
    .fieldrow{display:grid;grid-template-columns:repeat(12,1fr);gap:10px;margin-top:10px}.f2{grid-column:span 2}.f3{grid-column:span 3}.f4{grid-column:span 4}.f6{grid-column:span 6}.f8{grid-column:span 8}.f12{grid-column:span 12}
    .fieldrow>div{min-width:0}
    input[type="date"].user{min-width:0;max-width:100%;}
    .btnrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
    button{
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font:inherit;
      font-weight:800;
      cursor:pointer;
      background:var(--btn-bg);
      color:var(--btn-text);
      border:1px solid var(--btn-border);
      min-height:40px;
      transition:.18s ease;
    }
    button:hover{border-color:var(--brand-border);transform:translateY(-1px)}
    button.primary{background:var(--btn-primary-bg);color:var(--btn-primary-text);border-color:var(--btn-primary-border)}
    button.good{background:var(--btn-good-bg);color:var(--btn-good-text);border-color:var(--btn-good-border)}
    button.warn{background:var(--btn-warn-bg);color:var(--btn-warn-text);border-color:var(--btn-warn-border)}
    button.bad{background:var(--btn-bad-bg);color:var(--btn-bad-text);border-color:var(--btn-bad-border)}
    button.ghost{background:var(--btn-ghost-bg);color:var(--text-main)}
    a.buttonlink{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:12px;padding:10px 12px;font:inherit;font-weight:800;cursor:pointer;background:var(--btn-bg);color:var(--btn-text);border:1px solid var(--btn-border);min-height:40px;text-decoration:none;transition:.18s ease}
    a.buttonlink:hover,a.buttonlink:focus{border-color:var(--brand-border);transform:translateY(-1px);outline:none}
    a.buttonlink:focus{box-shadow:0 0 0 3px var(--focus-ring)}
    a.buttonlink.primary{background:var(--btn-primary-bg);color:var(--btn-primary-text);border-color:var(--btn-primary-border)}
    a.buttonlink.ghost{background:var(--btn-ghost-bg);color:var(--text-main)}
    button:disabled{opacity:.48;cursor:not-allowed;transform:none!important;border-color:var(--line-soft)!important;filter:saturate(.65)}
    .pill.live{background:var(--pill-live-bg);color:var(--pill-live-text);border-color:var(--pill-live-border)}
    .selftest-controls{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin:10px 0}.selftest-controls>div{min-width:220px;flex:1}.selftest-meta{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
    .mini{padding:6px 8px;min-height:30px;border-radius:9px;font-size:12px}
    .notepen{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;padding:0;border:1px solid var(--line-soft);border-radius:8px;background:var(--field-bg);color:var(--text-muted);cursor:pointer;font-size:13px;line-height:1;vertical-align:middle}
    .notepen.has-note{color:var(--btn-primary-text);background:var(--brand);border-color:var(--brand-border)}
    .noteedit{margin:6px 0 4px}
    .noteedit textarea{width:100%;min-height:60px}
    .notebox{margin:6px 0 4px;padding:6px 9px;border:1px solid var(--line-soft);border-radius:10px;background:var(--surface-inset);color:var(--text-muted);font-size:12px;white-space:pre-wrap}
    .endbarbox{margin:8px 0;padding:10px;border-left:4px solid var(--warnbox-line);border-radius:12px;background:var(--warnbox-bg);color:var(--warnbox-text)}
    .endbarhead{font-weight:800;font-size:13px;margin-bottom:6px}
    .print-only{display:none}
    .notepen-static{color:var(--text-muted)}
    .pill{
      display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 9px;
      font-size:12px;font-weight:850;white-space:nowrap;border:1px solid transparent;
    }
    .pill.ok{background:var(--pill-ok-bg);color:var(--pill-ok-text);border-color:var(--pill-ok-border)}
    .pill.warn{background:var(--pill-warn-bg);color:var(--pill-warn-text);border-color:var(--pill-warn-border)}
    .pill.bad{background:var(--pill-bad-bg);color:var(--pill-bad-text);border-color:var(--pill-bad-border)}
    .pill.neutral{background:var(--pill-neutral-bg);color:var(--pill-neutral-text);border-color:var(--pill-neutral-border)}
    .pill.local{background:var(--pill-local-bg);color:var(--pill-local-text);border-color:var(--pill-local-border)}
    .pill.local::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--pill-local-text)}
    .pill.pulse{animation:softPulse 1.4s ease-in-out infinite}
    @keyframes softPulse{0%,100%{box-shadow:0 0 0 0 var(--next-due-border)}50%{box-shadow:0 0 0 5px transparent}}
    @media (prefers-reduced-motion: reduce){

<script>
(() => {

  // =====================================================================
  // DCIEM: diep bevroren bron van waarheid. Single source of truth.
  // Tabelbron: IWOD 002 Decompressiemethoden (1 april 2019), par. 2300
  // luchttabel 1, cel voor cel overgenomen. Randvoorwaarden: WOD brandweer
  // v2.0, bijlage 11.5. null = geen bruikbare tabelwaarde (lege/uitgesloten

  function deepFreeze(obj){
    if(!obj || typeof obj !== "object" || Object.isFrozen(obj)) return obj;

    return obj;
  }
  function isDeepFrozen(obj, seen=new Set()){
    if(!obj || typeof obj !== "object") return true;
    if(seen.has(obj)) return true;
    if(!Object.isFrozen(obj)) return false;
    seen.add(obj);
    return Object.values(obj).every(value => isDeepFrozen(value, seen));
  }
  function stableStringify(value){
    if(Array.isArray(value)) return `[${value.map(stableStringify).join(",")}]`;
    if(value && typeof value === "object"){
      return `{${Object.keys(value).sort().map(key => `${JSON.stringify(key)}:${stableStringify(value[key])}`).join(",")}}`;
    }

  // gebruikt voor de canonieke rekenbronfingerprint in OSOD-exportrecords
  // (calculation.engine.tableFingerprintSha256). De korte fnv1a32-waakhond

    0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,

    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,

  function ensureSettings(){
    if(!state.settings || typeof state.settings !== "object") state.settings = {};

  // Twee modi: night en day. Oude "bright" migreert naar day. "auto" laat de klok kiezen.
  function normalizeThemePreference(value){
    if(value === "night") return "night";
    if(value === "day" || value === "bright") return "day";
    return "auto";
  }
  // Automatische startstand op lokale klok: 's avonds/'s nachts donker, overdag licht.
  // Volledig offline; geen locatietoestemming. De drempels schuiven licht mee met het
  // seizoen via een grove benadering, voldoende voor een schermthema. Retourneert
  // "night" of "day".
  function autoThemeForDate(date=new Date()){
    const h = date.getHours() + date.getMinutes()/60;
    const month = date.getMonth(); // 0=jan
    const sunrise = [8.0,7.5,7.0,6.0,5.5,5.0,5.5,6.0,7.0,7.5,8.0,8.5][month];
    const sunset  = [17.0,17.5,18.5,20.0,21.0,21.5,21.5,21.0,19.5,18.5,17.0,16.5][month];
    return (h >= sunrise && h < sunset) ? "day" : "night";
  }
  function resolveTheme(){
    const pref = normalizeThemePreference(state.settings?.theme);
    return pref === "auto" ? autoThemeForDate() : pref;
  }
  function applyTheme(){
    const active = resolveTheme();
    // Thema op documentElement (html), niet alleen body, zodat color-scheme en
    // alle tokens coherent op de root staan.
    document.documentElement.setAttribute("data-theme", active);
    if(document.documentElement.style) document.documentElement.style.colorScheme = active === "night" ? "dark" : "light";
    document.querySelectorAll("[data-theme-set]").forEach(btn=>{
      const btnTheme = normalizeThemePreference(btn.dataset.themeSet);
      btn.setAttribute("aria-pressed", btnTheme === active ? "true" : "false");
    });
  }
  function setTheme(choice){
    const pref = normalizeThemePreference(choice);

    mutate(()=>{ ensureSettings(); state.settings.theme = pref; });
    applyTheme();
  }

  function airCheckIntervalForDepth(mdd){

  function ensurePhases(d){

  function ensureAirFields(d){

  function migrateDiveRows(){
    for(const listName of ["planning","live"]){
      if(!Array.isArray(state[listName])) state[listName] = [];
      state[listName].forEach(d=>{
        d.id = safeRowId(d.id);

        d.daypart = normalizeDaypart(oldGroup);

        delete d[oldSeriesKey];
        if(!["normal","auto","s6","s9","s12"].includes(d.rule)) d.rule = "auto";

  function repairActiveLiveTimerDates(){
    // Compatibiliteitsreparatie voor oude live-records die vóór de startTs-migratie zijn opgeslagen.
    // Aanleiding: in vroege iOS/nacht-situaties kon de tekstuele datum één dag verschuiven terwijl
    // het lokale tijdstip wel klopte. Sinds de live-write met startTs/ascentStartTs/surfaceTs en
    // timeTs werkt, rekent de monitor primair op timestamps. Deze heuristiek blijft alleen voor
    // oude records zonder startTs actief en kan worden uitgefaseerd zodra zulke records niet meer
    // in productie/browseropslag voorkomen.
    const today = localDate();
    let repaired = 0;
    for(const d of state.live || []){
      if(!d || d.surface || !d.start || normalizeEntryMode(d.entryMode) !== "live") continue;
      syncLiveTimeFields(d);
      const start = readStampedDT(d, "start");
      if(!start) continue;
      const startDate = localDateFromDate(start);
      if(startDate === today) continue;
      // Alleen oude records zonder timestamp kunnen de bekende UTC-datum/lokale-tijd-bug bevatten.
      if(isFiniteTs(d.startTs)) continue;
      const elapsedMin = minsBetween(start, new Date());
      const elapsedModDay = ((elapsedMin % 1440) + 1440) % 1440;
      // Herstel specifiek de bekende iOS/nacht-bug: startdatum één dag fout, tijdstip wel recent.
      if(elapsedMin > 12 * 60 && elapsedMin < 48 * 60 && elapsedModDay < LIVE_TIMER_MAX_MIN){
        d.start = retagDate(d.start, today); syncTsFromText(d, "start");
        if(d.ascentStart){ d.ascentStart = retagDate(d.ascentStart, today); syncTsFromText(d, "ascentStart"); }
        if(Array.isArray(d.airMeasurements)) d.airMeasurements.forEach(m=>{ if(m.time){ m.time = retagDate(m.time, today); const dt=parseDT(m.time); if(dt) m.timeTs=dt.getTime(); } });
        if(Array.isArray(d.phases)) d.phases.forEach(p=>{ if(p.start) p.start = retagDate(p.start, today); if(p.end) p.end = retagDate(p.end, today); });
        repaired++;
      }
    }
    return repaired;
  }

  function load(){
    try{
      let raw = localStorage.getItem(STORAGE_KEY);
      if(!raw){
        for(const key of LEGACY_STORAGE_KEYS){ raw = localStorage.getItem(key); if(raw) break; }
      }
      const def = defaultState();
      if(raw){
        const parsed = JSON.parse(raw);
        state = {...def, ...parsed, project:{...def.project, ...(parsed.project || {})}, settings:{...def.settings, ...(parsed.settings || {})}};
      } else {
        state = def;
      }
      const oldKey = "co" + "ordinator";
      if(state.project[oldKey] && !state.project.dpl) state.project.dpl = state.project[oldKey];
      ensureSettings();
      ensureDayparts();
      ensureProjectMeta();
      ensureDivers();
      migrateDiveRows();
      if(repairActiveLiveTimerDates()) localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }catch(e){ console.warn(e); state = defaultState(); }
  }
  function save(){
    const el = document.getElementById("saveState");

      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      if(el){ el.classList.remove("bad"); el.classList.add("local"); el.textContent = "Opgeslagen"; setTimeout(()=>{ el.textContent = "Lokaal opgeslagen"; }, 1200); }
    }catch(err){
      // Opslag kan vol zijn of door browserbeleid geblokkeerd. Niet stilzwijgend doen
      // alsof het gelukt is: voor een dagregistratie is een gemiste opslag relevant.
      if(el){ el.textContent = "NIET opgeslagen (opslag vol of geblokkeerd)"; el.classList.remove("local"); el.classList.add("bad"); }
      try{ alert("Let op: de gegevens konden niet lokaal worden opgeslagen. De opslag is mogelijk vol of geblokkeerd door de browser. Exporteer je gegevens om ze veilig te stellen."); }catch(e){}
    }
  }

  function parseDT(v){ if(!v) return null; const d = new Date(v); return isNaN(d.getTime()) ? null : d; }
  function toInputDT(d){ if(!d) return ""; return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,19); }
  function fmtTime(d, seconds=true){ if(!d) return "-"; return d.toLocaleTimeString("nl-NL", {hour:"2-digit", minute:"2-digit", second:seconds?"2-digit":undefined}); }
  function fmtClockMinute(d){ return fmtTime(d, false); }
  function fmtDate(d){ if(!d) return "-"; return d.toLocaleDateString("nl-NL"); }
  function fmtMin(m){ return Number.isFinite(m) ? String(Math.round(m)) : "-"; }
  function fmtHF(hf){ return Number.isFinite(hf) ? hf.toFixed(1).replace('.', ',') : "-"; }
  function fmtDec(n, digits=1){ return Number.isFinite(n) ? Number(n).toFixed(digits).replace('.', ',') : "-"; }
  function fmtBar(n){ return Number.isFinite(n) ? `${Math.round(n)} bar` : "-"; }
  function fmtSecs(sec){ if(!Number.isFinite(sec)) return "-"; const s = Math.round(sec); const m = Math.floor(s/60); const r = s%60; return m ? `${m}:${String(r).padStart(2,"0")} min` : `${r} sec`; }
  function minsBetween(a,b){ if(!a||!b) return null; return (b.getTime()-a.getTime())/60000; }
  function ceilMinFromMs(ms){ return Math.max(0, Math.ceil(ms/60000)); }
  function addSec(d, sec){ return new Date(d.getTime()+sec*1000); }
  function addMin(d, min){ return new Date(d.getTime()+min*60000); }
  function depthBand(maxDepth){

  function letterIndex(L){ return LETTERS.indexOf(L); }

  // OSOD rekencontract sectie 5, HG-aanpassing bij herhalingsduik:
  // HI > 6 uur: geen aanpassing. HI <= 6 uur en nieuwe HG hoger dan voorgaande: geen

  function osodAdjustHG(prevHG, rawHG, oiMin){
    if(!prevHG || !rawHG || oiMin == null || oiMin > 360) return {hg:rawHG, adjusted:false, error:false};
    if(letterIndex(rawHG) > letterIndex(prevHG)) return {hg:rawHG, adjusted:false, error:false};

  function getHF(prevHG, oiMin){
    if(!prevHG) return {hf:1, label:"eerste duik", reset:true};
    if(oiMin == null) return {hf:null, label:"OI onbekend", unknown:true};
    if(oiMin > 1080) return {hf:1, label:"OI > 18:00", reset:true};
    if(oiMin < 15) return {hf:null, label:"OI < 0:15", short:true};
    const idx = table4aCols.findIndex(c => oiMin >= c.min && oiMin <= c.max);
    if(idx < 0) return {hf:null, label:"OI buiten tabel", unknown:true};

  // Vooruitblik herhalingsduik: projecteert, op basis van de laatste HG en het
  // lopende oppervlakte-interval, de actuele HF en herhalings-NDL, plus de tijdstippen
  // waarop de HF gunstiger wordt tot HF weer 1,0 is. Rekent zuiver met tabel 4a/4b
  // vooruit, verandert geen bestaande berekening, en rondt conservatief (geen
  // gunstigere HF tonen dan de tabel toestaat). Retour: null als niet van toepassing.
  function repeatProjection(prevHG, surfaceTime, mdd, now=new Date()){
    if(!prevHG || !surfaceTime) return null;
    const oiNow = Math.max(0, Math.floor(minsBetween(surfaceTime, now)));
    const depth = parseNum(mdd);
    const rd = repeatDepth(depth);
    // Huidige stand. Onder 0:15 OI is herduiken volgens tabel nog niet te bepalen.
    const cur = getHF(prevHG, oiNow);
    const curNdl = (cur.hf && rd) ? getRepeatNDL(depth, cur.hf) : null;
    // Toekomstige drempels: per OI-kolom het instapmoment (kolomgrens) en de HF daar.
    // We tonen alleen kolommen die nog moeten komen en waarbij de HF daalt, plus het
    // moment waarop HF = 1,0 (reset). Tijd tot drempel = kolomgrens (min) - oiNow.
    const steps = [];
    let lastHf = cur.hf == null ? Infinity : cur.hf;
    for(const col of table4aCols){
      if(col.min <= oiNow) continue;            // al gepasseerd
      const hf = table4a[prevHG]?.[table4aCols.indexOf(col)];
      if(hf == null) continue;                   // lege tabelcel
      if(hf >= lastHf) continue;                 // geen verbetering, overslaan
      const minutesUntil = col.min - oiNow;
      steps.push({
        atMin: col.min,
        minutesUntil,
        at: addMin(now, minutesUntil),
        hf,
        ndl: rd ? getRepeatNDL(depth, hf) : null
      });
      lastHf = hf;
    }
    // Schoon (HF 1,0) pas bij OI boven 18:00; eerste schone minuut is 1081 (18:01).
    let reset = null;

      const minutesUntil = 1081 - oiNow;
      reset = {atMin:1081, minutesUntil, at:addMin(now, minutesUntil)};
    }
    return {
      oiNow,
      depth: rd,
      now: {hf:cur.hf, label:cur.label, ndl:curNdl, short:!!cur.short, unknown:!!cur.unknown, empty:!!cur.empty},
      steps,
      reset
    };
  }
  function fmtDur(min){

  function severityLabel(sev){

  function localDayKey(value){

  function ascentCheck(d){
    if(!d) return {key:"none", cls:"neutral", label:"", detail:"", visible:false, report:"-"};
    const dataset = d.dataset || (state.planning.includes(d) ? "planning" : "live");
    const n = normalizeDive(d, dataset);
    const w = n.ascentWindow || ascentWindow(n.mdd);
    const venster = `venster ${fmtSecs(w.min)}-${fmtSecs(w.max)}`;
    if(n.dataset === "planning") return {key:"planning", cls:"neutral", label:"Opkomstvenster", detail:venster, visible:true, report:`Opkomstvenster (${venster})`};
    if(!n.surface){
      if(n.ascentStart){
        if(!Number.isFinite(n.mdd) || !w.min || !w.max) return {key:"check", cls:"warn", label:"↑ controleren", detail:"MDD ontbreekt", visible:true, report:"Opkomst: controleren (MDD ontbreekt)"};
        const elapsed = Math.max(0, Math.round((new Date() - n.ascentStart)/1000));
        const remaining = Math.max(0, Math.ceil(w.min - elapsed));
        if(elapsed > w.max) return {key:"slow-live", cls:"warn pulse", label:"↑ langzaam", detail:`${fmtSecs(elapsed)} sinds opkomst; maximum ${fmtSecs(w.max)}`, visible:true, report:`Opkomst loopt (${fmtSecs(elapsed)} sinds start opkomst)`};
        if(remaining > 0) return {key:"countdown", cls:"warn pulse", label:`↑ nog ${fmtSecs(remaining)}`, detail:`minimum ${fmtSecs(w.min)} bij ${fmtDec(n.mdd,1)} m`, visible:true, report:`Opkomst loopt (nog ${fmtSecs(remaining)})`};
        return {key:"ok-live", cls:"ok", label:"↑ OK", detail:`minimum ${fmtSecs(w.min)} gehaald`, visible:true, report:`Opkomst loopt (${fmtSecs(elapsed)} sinds start opkomst)`};
      }

    if(!n.ascentStart) return {key:"missing-ascent", cls:"warn", label:"Opkomst niet geregistreerd", detail:"Boven/einde is vastgelegd zonder start opkomst", visible:true, report:"Opkomst niet geregistreerd"};
    if(!Number.isFinite(n.mdd) || !w.min || !w.max) return {key:"check", cls:"warn", label:"Opkomst controleren", detail:"MDD ontbreekt", visible:true, report:"Opkomst controleren (MDD ontbreekt)"};
    const actual = Math.round((n.surface - n.ascentStart)/1000);
    if(!Number.isFinite(actual) || actual < 0) return {key:"check", cls:"warn", label:"Opkomst controleren", detail:"tijdvolgorde controleren", visible:true, report:"Opkomst controleren (tijdvolgorde controleren)"};
    if(actual <= 5) return {key:"check", cls:"warn", label:"Opkomst controleren", detail:`${fmtSecs(actual)} gemeten; mogelijk bedienmoment`, visible:true, report:`Opkomst controleren (${fmtSecs(actual)} gemeten)`};
    if(actual < w.min) return {key:"fast", cls:"bad", label:"Opkomst snel", detail:`${fmtSecs(actual)}; minimum ${fmtSecs(w.min)} bij ${fmtDec(n.mdd,1)} m`, visible:true, report:`Opkomst snel (${fmtSecs(actual)}; minimum ${fmtSecs(w.min)})`};
    if(actual > w.max) return {key:"slow", cls:"warn", label:"Opkomst langzaam", detail:`${fmtSecs(actual)}; maximum ${fmtSecs(w.max)} bij ${fmtDec(n.mdd,1)} m`, visible:true, report:`Opkomst langzaam (${fmtSecs(actual)}; maximum ${fmtSecs(w.max)})`};
    return {key:"ok", cls:"ok", label:"Opkomst OK", detail:`${fmtSecs(actual)}; ${venster}`, visible:true, report:`Opkomst OK (${fmtSecs(actual)})`};

  function ascentCheckText(d){

  function ascentSeverity(d){

  function airStatus(d){

      if(startBar == null) add(1, "Begindruk ontbreekt.");
      if(!last) add(1, "Einddruk of laatste luchtmeting ontbreekt.");

        if(last.bar <= AIR_STOP_BAR) add(2, "100 bar bereikt of onderschreden.");

      return {severity, messages};

  function exerciseOptionHtml(selected){

  }
  function daypartLabel(daypart){ return `Dagdeel ${normalizeDaypart(daypart)}`; }
  function daypartShort(daypart){ return `DD${normalizeDaypart(daypart)}`; }
  function daypartOptions(selected){

  function daypartRule(rule, mdd){
    if(rule === "auto"){
      const d = parseNum(mdd);

      if(d <= 9) return "s9";

  function ruleLabel(rule, mdd){

  function normalizeDive(raw, dataset){
    const diver = state.divers.find(d=>d.id===raw.diverId) || state.divers[0];
    const mdd = parseNum(raw.mdd);
    const win = ascentWindow(mdd);
    let start = readStampedDT(raw, "start");
    let ascentStart = readStampedDT(raw, "ascentStart");
    let surface = readStampedDT(raw, "surface");
    let dtMin = null, surfaceEarly=null, surfaceLate=null, nominalSurface=null, dtSource = dataset === "planning" ? "planning" : "tijd in-uit";
    if(dataset === "planning"){
      const plannedDT = parseNum(raw.dtMin);
      if(start && Number.isFinite(plannedDT)){
        dtMin = Math.max(0, Math.ceil(plannedDT));
        ascentStart = addMin(start, plannedDT);
        surfaceEarly = addSec(ascentStart, win.min ?? 0);
        nominalSurface = addSec(ascentStart, win.nominal ?? 0);
        surfaceLate = addSec(ascentStart, win.max ?? 0);
        surface = surfaceLate;
      }
    }else{
      let timerNeedsCheck = false;
      if(start && ascentStart) dtMin = ceilMinFromMs(ascentStart - start);
      else if(start && surface) dtMin = ceilMinFromMs(surface - start);
      else if(start && !surface){
        const elapsed = ceilMinFromMs(new Date() - start);
        if(dataset === "live" && normalizeEntryMode(raw.entryMode) === "live" && elapsed > LIVE_TIMER_MAX_MIN){
          dtMin = 0;
          dtSource = "tijd controleren";
          timerNeedsCheck = true;
        }else{
          dtMin = elapsed;
        }
      }
      if(start && ascentStart && !surface) nominalSurface = addSec(ascentStart, win.nominal ?? 0);
      raw.timerNeedsCheck = timerNeedsCheck;
    }
    const pstats = phaseStats(raw);
    // Chronologie binnen één duik: start <= ascentStart <= surface. Een omgekeerde
    // volgorde is fysiek onmogelijk en mag niet als gewone ontbrekende DT worden afgedaan.
    let chronoError = false;
    if(dataset !== "planning"){
      if(start && ascentStart && ascentStart < start) chronoError = true;
      if(start && surface && surface < start) chronoError = true;
      if(ascentStart && surface && surface < ascentStart) chronoError = true;
    }
    if(dataset !== "planning"){
      const mode = normalizeDtMode(raw.dtMode || (raw.dtUsedMin ? "manual" : "auto"));
      const manual = parseNum(raw.dtUsedMin);
      if(mode === "phases" && Number.isFinite(pstats.totalMin) && pstats.totalMin > 0){
        dtMin = pstats.totalMin;
        dtSource = "som fasen";
      }else if(mode === "manual" && Number.isFinite(manual) && manual > 0){
        dtMin = Math.ceil(manual);
        dtSource = "handmatig";
      }
    }
    return {...raw, daypart:normalizeDaypart(raw.daypart), entryMode:normalizeEntryMode(raw.entryMode), registrationType:normalizeRegistrationType(raw.registrationType), dtMode:normalizeDtMode(raw.dtMode), diverLabel:displayDiver(diver || raw.diverId), start, ascentStart, surface, surfaceEarly, surfaceLate, nominalSurface, mdd, dtMin, dtSource, phaseTotalMin:pstats.totalMin, phaseCount:pstats.count, phaseComplete:pstats.complete, chronoError, tableDepth:tableDepth(mdd), ascentWindow:win, dataset, timerNeedsCheck:!!raw.timerNeedsCheck};
  }

  function buildUnits(dives, dataset){
    const normalized = dives.map(d => normalizeDive(d, dataset)).filter(d => d.diverId && d.start);
    const grouped = new Map();
    const units = [];
    for(const d of normalized){
      const applied = daypartRule(d.rule, d.mdd);
      const meterRuleCandidate = d.rule === "auto" || ["s6","s9","s12"].includes(d.rule);
      if(meterRuleCandidate && applied){
        const groupKey = d.rule === "auto" ? "auto" : applied;
        const key = `${d.diverId}::${normalizeDaypart(d.daypart)}::${groupKey}`;
        if(!grouped.has(key)) grouped.set(key, []);
        grouped.get(key).push(d);
      }else{
        units.push(unitFromEvents([d], dataset));
      }
    }
    for(const arr of grouped.values()) units.push(unitFromEvents(arr, dataset));
    units.sort((a,b)=>a.start-b.start);
    const byDiver = new Map();
    for(const u of units){ if(!byDiver.has(u.diverId)) byDiver.set(u.diverId, []); byDiver.get(u.diverId).push(u); }
    const resultUnits=[];
    for(const arr of byDiver.values()){
      arr.sort((a,b)=>a.start-b.start);
      let prev = null, chainBlocker = null;
      for(const u of arr){
        if(chainBlocker?.surface && u.start && minsBetween(chainBlocker.surface, u.start) > 1080){
          chainBlocker = null;
          prev = null;
        }
        const r = calcUnit(u, chainBlocker ? null : prev);
        Object.assign(u, r);
        if(chainBlocker){
          addMsg(u,2,"Eerdere duik voor deze duiker is niet volledig tabelmatig berekend of heeft geen boven-tijd; herhalingsduik handmatig beoordelen.","INVALID_INPUT");
          u.chainBlockedBy = chainBlocker.id;
        }
        resultUnits.push(u);
        if((u.hgAdjusted || u.hgRaw) && u.surface && !u.chainBlockedBy){
          prev = u;
        }else{
          chainBlocker = u;
          prev = null;
        }
      }
    }
    applyAscentLimits(normalized, resultUnits);
    applyMeterRulePeriodTotals(normalized, resultUnits);
    applyOperationalStatus(resultUnits);
    resultUnits.sort((a,b)=>a.start-b.start);
    const byEvent = new Map();
    for(const u of resultUnits){
      for(const e of u.events) byEvent.set(e.id, u);
    }
    return {units:resultUnits, byEvent, events:normalized};
  }

  function unitFromEvents(events, dataset){
    events.sort((a,b)=>a.start-b.start);
    const start = events[0].start;
    const surface = events.reduce((m,e)=> (!m || (e.surface && e.surface>m)) ? e.surface : m, null);
    const missingMddCount = events.filter(e=>!Number.isFinite(e.mdd) || e.mdd <= 0).length;
    const missingDtCount = events.filter(e=>!Number.isFinite(e.dtMin)).length;
    const mddMax = Math.max(...events.map(e=>Number.isFinite(e.mdd)?e.mdd:0));
    const dtTotal = events.reduce((s,e)=>s+(Number.isFinite(e.dtMin)?e.dtMin:0),0);
    const diver = state.divers.find(d=>d.id===events[0].diverId);
    return {
      id:"u_"+events.map(e=>e.id).join("_"),
      diverId:events[0].diverId,
      diverLabel:displayDiver(diver || events[0].diverId),
      dataset,
      events,
      start,
      surface,
      mddMax,
      dtTotal,
      tableDepth:tableDepth(mddMax),
      missingMddCount,
      missingDtCount,
      rule:events[0].rule || "normal",
      daypart:normalizeDaypart(events[0].daypart),
      shallowRuleKey:daypartRule(events[0].rule || "normal", mddMax),
      appliedRule:(events.length > 1 ? daypartRule(events[0].rule || "normal", mddMax) : null),
      meterRuleApplied:events.length > 1 && !!daypartRule(events[0].rule || "normal", mddMax),
      ascentCount:events.length,
      dtSource:[...new Set(events.map(e=>e.dtSource).filter(Boolean))].join(", ") || "-",
      phaseCount:events.reduce((n,e)=>n+(e.phaseCount||0),0),
      chronoError:events.some(e=>e.chronoError),
      phaseIncomplete:events.some(e=>e.dtMode==="phases" && (e.phaseCount||0) > 0 && (e.phaseComplete||0) !== (e.phaseCount||0)),
      messages:[],
      severity:0,
      codes:[]
    };
  }

  function addMsg(obj, sev, msg, code){
    obj.severity = Math.max(obj.severity||0, sev);
    if(!obj.messages) obj.messages=[];
    if(!obj.messages.includes(msg)) obj.messages.push(msg);
    if(code && sev >= 2){
      if(!obj.codes) obj.codes=[];
      if(!obj.codes.includes(code)) obj.codes.push(code);
    }
  }

  function calcUnit(u, prev){
    const res = {messages:[], severity:0, codes:[], oiMin:null, hf:null, hfLabel:"-", edt:null, ndl:null, hgRaw:null, hgAdjusted:null, calcType:"", safetyStop:false};
    if((u.events || []).some(e=>e.timerNeedsCheck)){
      addMsg(res,1,"Actieve timer is langer dan 8 uur; controleer starttijd of zet de duik boven/einde.");
      return res;
    }
    if(u.missingMddCount > 0){ addMsg(res,2,"Een of meer duikmomenten hebben geen geldige MDD; tabelberekening geblokkeerd.","INVALID_INPUT"); return res; }
    if(!u.tableDepth){ addMsg(res,2,"MDD ontbreekt of is dieper dan 15 meter; buiten toepassingsbereik.","OUTSIDE_DEPTH_ENVELOPE"); return res; }
    if(u.missingDtCount > 0){ addMsg(res,2,"Een of meer duikmomenten hebben geen geldige DT; tabelberekening geblokkeerd.","INVALID_INPUT"); return res; }
    if(u.chronoError){ addMsg(res,2,"Tijdvolgorde binnen de duik is onmogelijk (boven-tijd ligt vóór de start- of opkomsttijd). Controleer de in- en uittijden; tabelberekening geblokkeerd.","INVALID_INPUT"); return res; }
    if(u.phaseIncomplete){ addMsg(res,2,"Niet alle fasen zijn compleet (een fase mist een begin- of eindtijd); de som van de fasen onderschat de duiktijd. Maak de fasen compleet of kies een andere DT-bron; tabelberekening geblokkeerd.","INVALID_INPUT"); return res; }
    if(!u.dtTotal){ addMsg(res,1,"DT ontbreekt of is 0 minuten."); return res; }
    if(prev?.surface && u.start) res.oiMin = Math.floor(minsBetween(prev.surface, u.start));
    if(res.oiMin != null && res.oiMin < 0){
      // Fysiek onmogelijk voor dezelfde duiker: deze duik begint vóór de vorige boven is.
      // Niet degraderen naar de "<15 min"-tak met een verwarrend negatief getal, maar hard
      // blokkeren met een melding die de oorzaak benoemt. Terugval op handmatige beoordeling.
      addMsg(res,2,"Tijdvolgorde: deze duik begint vóór de vorige duik boven is (oppervlakte-interval is negatief). Controleer de in- en uittijden; tabelberekening geblokkeerd.","INVALID_INPUT");
      return res;
    }

    if(!u.appliedRule && u.shallowRuleKey && u.rule !== "auto"){
      const selectedRule = shallowRules[u.shallowRuleKey];
      if(selectedRule && u.mddMax > selectedRule.maxDepth){
        addMsg(res,2,`${selectedRule.label} gekozen, maar MDD ${u.mddMax.toFixed(1)} m is dieper dan ${selectedRule.maxDepth} m.`,"INVALID_INPUT");
        if(u.shallowRuleKey === "s12") addMsg(res,1,over12PlannedGuidance);
      }
    }

    if(u.appliedRule){
      const rule = shallowRules[u.appliedRule];
      res.calcType = rule.label;
      if(u.rule !== "auto" && u.mddMax > rule.maxDepth){
        addMsg(res,2,`${rule.label} gekozen, maar MDD ${u.mddMax.toFixed(1)} m is dieper dan ${rule.maxDepth} m.`,"INVALID_INPUT");
        if(u.appliedRule === "s12") addMsg(res,1,over12PlannedGuidance);
      }
      if(u.dtTotal > rule.totalLimit){
        addMsg(res,2,`Totale duiktijd binnen meterregel ${u.dtTotal} min overschrijdt ${rule.label} (${rule.totalLimit} min).`,"BOTTOM_TIME_EXCEEDS_METER_RULE");
      }
      if(prev && res.oiMin != null && res.oiMin <= 1080) addMsg(res,1,`${rule.label} vereist start met HF 1,0; vorige HG is nog niet volledig vervallen.`);
      res.hf = 1;
      res.hfLabel = "start HF 1,0";
      res.edt = u.dtTotal;
      res.ndl = rule.totalLimit;
      res.hgRaw = getHG(rule.maxDepth, u.dtTotal);
      if(!res.hgRaw) addMsg(res,2,"HG kan niet uit Airtabel 1 worden bepaald voor deze duiktijd.","BOTTOM_TIME_EXCEEDS_TABLE");
      res.hgAdjusted = res.hgRaw;
      return res;
    }
    if(u.mddMax > 12){
      if(u.rule === "auto") addMsg(res,2,"Dieper dan 12 meter: 6/9/12-meterregel niet toepasbaar. Gebruik DCIEM standaard en beoordeel de duiken afzonderlijk.","INVALID_INPUT");
      addMsg(res,1,over12PlannedGuidance);
    }

    res.calcType = "normaal";
    if(!prev || res.oiMin == null || res.oiMin > 1080){
      res.hf = 1;
      res.hfLabel = !prev ? "eerste duik" : "OI > 18:00";
      res.edt = u.dtTotal;
      res.ndl = airTable[u.tableDepth]?.ndl ?? null;
      if(res.ndl && u.dtTotal > res.ndl) addMsg(res,2,`DT ${u.dtTotal} min overschrijdt no-deco-limiet ${res.ndl} min in Airtabel 1.`,"BOTTOM_TIME_EXCEEDS_TABLE");
      res.hgRaw = getHG(u.tableDepth, u.dtTotal);
      if(!res.hgRaw) addMsg(res,2,"HG kan niet uit Airtabel 1 worden bepaald; DT valt buiten de tabelwaarden.","BOTTOM_TIME_EXCEEDS_TABLE");
      res.hgAdjusted = res.hgRaw;
      return res;
    }

    const hfRes = getHF(prev.hgAdjusted || prev.hgRaw, res.oiMin);
    res.hf = hfRes.hf;
    res.hfLabel = hfRes.label;
    if(hfRes.short){
      addMsg(res,1,"OI < 15 minuten: reguliere herhalingsduik niet volgens tabel 4a/4b; gebruik gecombineerde berekening of beoordeel handmatig.");
      res.edt = u.dtTotal;
      res.hgRaw = getHG(u.tableDepth, u.dtTotal);
      res.hgAdjusted = res.hgRaw;
      return res;
    }
    if(hfRes.empty){
      addMsg(res,2,"Tabel 4a geeft lege cel: HF > 2,0; reguliere herhalingsduik niet volgens tabel 4a/4b uitvoeren.","EMPTY_TABLE_CELL");
      return res;
    }
    if(!res.hf){ addMsg(res,1,"HF kon niet worden bepaald."); return res; }

    res.edt = Math.ceil(u.dtTotal * res.hf);
    res.ndl = getRepeatNDL(u.tableDepth, res.hf);
    if(!res.ndl){
      addMsg(res,1,"Voor deze diepte is geen herhalings-NDL in tabel 4b beschikbaar; gebruik 6-meterregel of beoordeel handmatig.");
    }else if(u.dtTotal <= res.ndl){
      // binnen tabel 4b
    }else{
      const airNdl = airTable[u.tableDepth]?.ndl;
      if(airNdl && res.edt < airNdl){
        res.safetyStop = true;
        addMsg(res,1,`DT overschrijdt tabel 4b (${res.ndl} min), maar EDT ${res.edt} min blijft onder Airtabel 1 NDL ${airNdl} min: veiligheidsstop 5 min op 3 m controleren.`);
      }else{
        addMsg(res,2,`DT ${u.dtTotal} min overschrijdt herhalings-NDL ${res.ndl} min bij HF ${fmtHF(res.hf)}.`,"BOTTOM_TIME_EXCEEDS_TABLE");
      }
    }
    res.hgRaw = getHG(u.tableDepth, res.edt);
    if(!res.hgRaw) addMsg(res,2,"HG na herhalingsduik kan niet uit Airtabel 1 worden bepaald.","BOTTOM_TIME_EXCEEDS_TABLE");
    const aanpassing = osodAdjustHG(prev.hgAdjusted || prev.hgRaw, res.hgRaw, res.oiMin);
    res.hgAdjusted = aanpassing.hg;
    if(aanpassing.adjusted) addMsg(res,0,`HG aangepast: ${res.hgRaw} wordt ${aanpassing.hg} (OI ≤ 6 uur).`);
    if(aanpassing.error) addMsg(res,2,"HG-aanpassing vereist maar volgende HG na O bestaat niet.","EMPTY_TABLE_CELL");
    return res;
  }

  function applyAscentLimits(events, units){
    const unitByEvent = new Map();
    for(const u of units) for(const e of u.events) unitByEvent.set(e.id, u);
    const byDiver = new Map();
    for(const e of events.filter(e=>e.start)){ if(!byDiver.has(e.diverId)) byDiver.set(e.diverId, []); byDiver.get(e.diverId).push(e); }
    for(const arr of byDiver.values()){
      arr.sort((a,b)=>(a.surface||a.start)-(b.surface||b.start));
      let periodStart = null, prev = null;
      for(const e of arr){
        const u = unitByEvent.get(e.id);
        const ref = e.surface || e.start;
        if(!periodStart) periodStart = e.start;
        if(prev?.surface && e.start){
          const gap = minsBetween(prev.surface, e.start);
          if(gap >= 60) periodStart = e.start;
          if(gap < 0){
            // Chronologisch onmogelijke volgorde: opstijging vóór de vorige boven.
            addMsg(u, 2, `Tijdvolgorde: deze opstijging valt ${Math.abs(Math.floor(gap))} min vóór de vorige boven-tijd. Controleer de in- en uittijden.`,"INVALID_INPUT");
          }else if(gap < 15){
            const sameDaypart = normalizeDaypart(e.daypart) === normalizeDaypart(prev.daypart);
            addMsg(u, sameDaypart ? 1 : 2, `OI tussen opstijgingen is ${Math.floor(gap)} min (<15 min).`,"SURFACE_INTERVAL_TOO_SHORT");
          }
        }
        if(ref && periodStart && minsBetween(periodStart, ref) > 240){
          addMsg(u,2,"Duikperiode overschrijdt 4 uur zonder rustpauze van minimaal 1 uur.","REST_PERIOD_EXCEEDED");
        }
        if(ref){
          const winStart = new Date(ref.getTime() - 240*60000);
          const inWindow = arr.filter(x => (x.surface||x.start) >= winStart && (x.surface||x.start) <= ref);
          const maxD = Math.max(...inWindow.map(x=>Number.isFinite(x.mdd)?x.mdd:0));
          const deepWindow = inWindow.filter(x => Number.isFinite(x.mdd) && x.mdd > 12);
          const lim = depthBand(maxD);
          if(inWindow.length > lim.period){
            addMsg(u,2,`Opstijgingslimiet 4 uur overschreden: ${inWindow.length}/${lim.period} (${lim.band}).`,"ASCENT_LIMIT_EXCEEDED");
          }else if(inWindow.length === lim.period){
            addMsg(u,1,`Opstijgingslimiet 4 uur bereikt: ${inWindow.length}/${lim.period} (${lim.band}).`);
          }
          if(deepWindow.length > 3){
            addMsg(u,2,`Maximaal 3 duiken dieper dan 12 m overschreden: ${deepWindow.length}/3; houd daarna HI aan tot HF weer 1,0 is.`,"ASCENT_LIMIT_EXCEEDED");
            addMsg(u,2,over12UnplannedProcedure,"ASCENT_LIMIT_EXCEEDED");
          }else if(deepWindow.length === 3){
            addMsg(u,1,"Maximaal 3 duiken dieper dan 12 m bereikt; houd daarna HI aan tot HF weer 1,0 is.");
          }
          const dayKey = localDayKey(ref);
          const dayEvents = arr.filter(x => localDayKey(x.surface||x.start) === dayKey && (x.surface||x.start) <= ref);
          const dayMaxD = Math.max(...dayEvents.map(x=>Number.isFinite(x.mdd)?x.mdd:0));
          const deepDayEvents = dayEvents.filter(x => Number.isFinite(x.mdd) && x.mdd > 12);
          const dlim = depthBand(dayMaxD);
          if(dayEvents.length > dlim.day){
            addMsg(u,2,`Daglimiet opstijgingen overschreden: ${dayEvents.length}/${dlim.day} (${dlim.band}).`,"ASCENT_LIMIT_EXCEEDED");
          }else if(dayEvents.length === dlim.day){
            addMsg(u,1,`Daglimiet opstijgingen bereikt: ${dayEvents.length}/${dlim.day} (${dlim.band}).`);
          }
          if(deepDayEvents.length > 3){
            addMsg(u,2,`Daglimiet voor duiken dieper dan 12 m overschreden: ${deepDayEvents.length}/3; houd daarna HI aan tot HF weer 1,0 is.`,"ASCENT_LIMIT_EXCEEDED");
            addMsg(u,2,over12UnplannedProcedure,"ASCENT_LIMIT_EXCEEDED");
          }else if(deepDayEvents.length === 3){
            addMsg(u,1,"Daglimiet voor duiken dieper dan 12 m bereikt: 3/3; houd daarna HI aan tot HF weer 1,0 is.");
          }
        }
        prev = e;
      }
    }
  }

  function applyMeterRulePeriodTotals(events, units){
    // Veiligheidsnet bovenop de dagdeel-gegroepeerde meterregelberekening in calcUnit.
    // calcUnit telt meterregelduiken op per duiker en dagdeel. Als een doorlopende
    // duikperiode (geen rustpauze van minimaal 1 uur) over twee dagdelen wordt verdeeld,
    // zou de opgetelde duiktijd anders niet tegen de meterregellimiet worden getoetst.
    // Deze laag telt zuiver op tijdsbasis op en voegt alleen een waarschuwing toe wanneer
    // de periodetotaaltijd over meer dan één rekeneenheid de limiet overschrijdt.
    const unitByEvent = new Map();
    for(const u of units) for(const e of u.events) unitByEvent.set(e.id, u);
    const byDiver = new Map();
    for(const e of events.filter(e=>e.start)){ if(!byDiver.has(e.diverId)) byDiver.set(e.diverId, []); byDiver.get(e.diverId).push(e); }
    for(const arr of byDiver.values()){
      arr.sort((a,b)=>(a.surface||a.start)-(b.surface||b.start));
      let prev = null, period = [];
      const flush = () => {
        const meter = period.filter(e => daypartRule(e.rule, e.mdd) && Number.isFinite(e.dtMin));
        if(!meter.length){ period = []; return; }
        const sumDt = meter.reduce((s,e)=>s+e.dtMin, 0);
        const maxD = Math.max(...meter.map(e=>Number.isFinite(e.mdd)?e.mdd:0));
        const band = depthBand(maxD);
        const rule = shallowRules[band.key];
        const unitSet = new Set(meter.map(e=>unitByEvent.get(e.id)).filter(Boolean));
        // Alleen melden als de optelling meer dan één rekeneenheid omvat (bijv. twee dagdelen);
        // het geval binnen één eenheid wordt al door calcUnit afgevangen.
        if(rule && sumDt > rule.totalLimit && unitSet.size > 1){
          for(const u of unitSet){
            addMsg(u, 2, `Meterregel: opgetelde duiktijd in deze duikperiode is ${sumDt} min over meerdere dagdelen en overschrijdt ${rule.label} (${rule.totalLimit} min). Controleer of dit operationeel één duikperiode is.`,"BOTTOM_TIME_EXCEEDS_METER_RULE");
          }
        }
        period = [];
      };
      for(const e of arr){
        if(prev?.surface && e.start && minsBetween(prev.surface, e.start) >= 60) flush();
        period.push(e);
        prev = e;
      }
      flush();
    }
  }

  function applyOperationalStatus(units){
    for(const u of units){
      for(const e of u.events || []){
        const asev = ascentSeverity({...e, dataset:u.dataset});
        if(asev > 0){
          const c = ascentCheck({...e, dataset:u.dataset});
          addMsg(u, asev, c.report || c.label || "Opkomst controleren.","ASCENT_CHECK_REQUIRED");
        }
        if(u.dataset === "live"){
          const air = airStatus(e);
          if(air.severity > 0){
            const msg = (air.messages || []).filter(Boolean).join(" | ");
            addMsg(u, air.severity, `Ademlucht: ${msg || "luchtregistratie controleren"}`,"AIR_MONITORING_ATTENTION");
          }
        }
      }
    }
  }

      el.title = "Kritieke rekencontroles geslaagd; een of meer niet-kritieke (cosmetisch/privacy) controles faalden.";

  function wireProject(){
    document.querySelectorAll("[data-project]").forEach(inp=>{
      if(inp.hasAttribute("data-required-project")) inp.oninput = updateMissingHints;
      inp.onchange=()=>mutate(()=>{
        if(inp.dataset.project === "date"){
          const oldDate = state.project.date || "";
          if(inp.value !== oldDate && hasRecordedTimes() && !confirm("Datum wijzigen verplaatst bestaande tijden naar de nieuwe datum. Doorgaan?")){
            inp.value = oldDate;
            return;
          }
          state.project.date = inp.value;
          retagAllDates(inp.value);

          state.project.location = cleanLocation(inp.value);
          inp.value = state.project.location;
        } else if(inp.dataset.project === "post"){
          state.project.post = cleanProjectText(inp.value);
          inp.value = state.project.post;
        } else if(inp.dataset.project === "dpl"){
          state.project.dpl = cleanDpl(inp.value);

  function renderWerkplan(calc){
    if(!state.planning.length) return "";
    const rows = state.planning.map((d,i)=>{
      const u = calc.byEvent.get(d.id);
      const diver = getDiver(d.diverId);
      const depth = parseNum(d.mdd);
      const ruleLabel = calculationLabel(u);
      const ruleTime = calculationLimitLabel(u);
      const air = airUsePerMin(depth);
      const airTxt = air ? `L ${air.low} · H ${air.high}` : "-";
      const planTime = parseNum(d.dtMin);
      return `<tr><td>${i+1}</td><td>${esc(displayDiver(diver))}</td><td>${depth!=null?esc(fmtDec(depth,1))+" m":"-"}</td><td>${esc(daypartLabel(d.daypart))}</td><td>${esc(ruleLabel)}</td><td>${esc(ruleTime)}</td><td>${planTime!=null?esc(String(planTime))+" min":"-"}</td><td class="mono">${airTxt}</td></tr>`;

  function renderStatus(unit){ if(!unit) return `<span class="pill neutral">Nog niet gestart</span>`; const s=severityLabel(unit.severity ?? 0); return `<span class="pill ${s.cls}">${s.txt}</span>`; }
  function dciemSummary(unit){
    if(!unit) return "-";
    const hg = unit.hgAdjusted || unit.hgRaw;
    if(!hg) return "-";
    // MDD tonen; als de tabeldiepte afwijkt van de ingevulde MDD (bijv. 8 m -> tabel 9 m), dat erbij.
    const mdd = fmtDec(unit.mddMax, 1);
    const mddTxt = (unit.tableDepth != null && Number(unit.mddMax) !== Number(unit.tableDepth))
      ? `MDD ${mdd} m (tabel ${unit.tableDepth} m)`
      : `MDD ${mdd} m`;
    const dt = fmtMin(unit.dtTotal);
    const dd = daypartShort(unit.daypart);
    if(isMeterRuleApplied(unit)){
      const rule = shallowRules[unit.appliedRule];
      return `${dd} · ${rule.label} toegepast: ${unit.events.length} duikmomenten van dezelfde duiker opgeteld, ${mddTxt}, DT totaal ${dt} min → HG ${hg}.`;
    }
    const base = `${dd} · Tabel 1 - ${unit.tableDepth} m tabeldiepte: HG ${hg} voor ${mddTxt}, DT ${dt} min`;
    // Eerste duik: geen OI, geen HF, geen EDT. Benoem expliciet dat er niets is samengevoegd.
    if(unit.oiMin == null){
      return `${base}. Geen samenvoeging.`;
    }
    // Herhalingsduik: toon de rekenstap EDT = DT x HF, en zo nodig de HG-ophoging met reden.
    const edt = fmtMin(unit.edt);
    let zin = `${dd} · Tabel 4a/4b - herhalingsduik: HG ${hg} voor ${mddTxt}: EDT = DT ${dt} × HF ${fmtHF(unit.hf)} = ${edt} min`;
    if(unit.hgAdjusted && unit.hgRaw && unit.hgAdjusted !== unit.hgRaw){
      zin += `, afgelezen ${unit.hgRaw}, opgehoogd naar ${unit.hgAdjusted} (OI ${Math.floor(unit.oiMin)} min ≤ 6 uur)`;
    }
    return zin + ".";
  }

  function wireDiveEditor(dataset){
    document.querySelectorAll(`[data-dataset="${dataset}"][data-dive-field]`).forEach(inp=>{
      inp.onchange = ()=> mutate(()=>{
        const arr = getDataset(dataset); const d = arr.find(x=>x.id===inp.dataset.id); if(!d) return;
        const field = inp.dataset.diveField;
        if(["start","ascentStart","surface"].includes(field)){
          d[field] = timeToDateTime(inp.value, d[field]);
          if(dataset === "live" && normalizeEntryMode(d.entryMode) === "live") syncTsFromText(d, field);
          else delete d[tsFieldName(field)];
        }
        else if(field === "mdd"){
          const raw = parseNum(inp.value);
          const v = cleanMddValue(inp.value, {clamp:true, fallback:""});
          if(Number.isFinite(raw) && raw > MAX_MDD) alert("Maximale duikdiepte is 15 m. De waarde is teruggezet naar 15.");
          d[field] = v;
          inp.value = v;
          if(dataset === "live") updateAirCheckInterval(d);
        }
        else if(["setNo","maskNo"].includes(field)) d[field] = cleanMaterial(inp.value);
        else if(field === "signalHolder") d[field] = cleanSignalHolder(inp.value);
        else if(field === "entryMode") d[field] = normalizeEntryMode(inp.value);
        else if(field === "registrationType") d[field] = normalizeRegistrationType(inp.value);
        else if(field === "dtMode") d[field] = normalizeDtMode(inp.value);
        else if(field === "dtUsedMin") d[field] = inp.value;
        else d[field] = inp.value;
        if(dataset === "live" && field === "diverId"){ const div=state.divers.find(x=>x.id===d.diverId); if(div){ if(!d.setNo) d.setNo=div.setNo||""; if(!d.maskNo) d.maskNo=div.maskNo||""; } }
      });
    });
    document.querySelectorAll(`[data-delete-dive][data-dataset="${dataset}"]`).forEach(btn=>btn.onclick=()=>{
      if(!confirm("Duikregel wissen?")) return;
      mutate(()=>{
        const arr = getDataset(dataset); const idx = arr.findIndex(x=>x.id===btn.dataset.id); if(idx>=0) arr.splice(idx,1);
      });
    });
    document.querySelectorAll(`[data-add-phase][data-dataset="${dataset}"]`).forEach(btn=>btn.onclick=()=>mutate(()=>{
      const d = getDataset(dataset).find(x=>x.id===btn.dataset.id); if(d){ ensurePhases(d).push(newPhase()); d.registrationType = d.registrationType === "normal" ? "rolechange" : normalizeRegistrationType(d.registrationType); }
    }));
    document.querySelectorAll(`[data-delete-phase][data-dataset="${dataset}"]`).forEach(btn=>btn.onclick=()=>mutate(()=>{
      const d = getDataset(dataset).find(x=>x.id===btn.dataset.id); const i = Number(btn.dataset.phaseIndex); if(d && Array.isArray(d.phases) && i>=0) d.phases.splice(i,1);
    }));
    document.querySelectorAll(`[data-phase-field][data-dataset="${dataset}"]`).forEach(inp=>inp.onchange=()=>mutate(()=>{
      const d = getDataset(dataset).find(x=>x.id===inp.dataset.id); const i = Number(inp.dataset.phaseIndex); if(!d) return; const phases = ensurePhases(d); const p = phases[i]; if(!p) return;
      const field = inp.dataset.phaseField;
      if(["start","end"].includes(field)) p[field] = timeToDateTime(inp.value, p[field]);
      else if(["startBar","endBar"].includes(field)) p[field] = cleanBarValue(inp.value);
      else p[field] = inp.value;
    }));
  }

  function renderLive(){

    const liveDivers = visibleDiversForDataset("live");
    document.getElementById("liveScreen").innerHTML = `<div class="grid">

      <div class="card span12"><div class="divehead"><div><div class="headline"><h2>Werkelijke duikregels</h2><details class="info no-print"><summary title="Uitleg Werkelijke duikregels" aria-label="Uitleg Werkelijke duikregels">i</summary><div class="info-body">Achteraf formulier overnemen of live regels corrigeren. Gebruik Registratievorm en Fasen / rolmomenten voor gecombineerde duiken en RD/ResD-wissels.</div></details></div></div><button class="primary no-print" id="addLive" title="Handmatige duikregel toevoegen">+ Regel</button></div>${renderDiveEditor("live", state.live, calc)}</div>

  }
  function newLiveDive(diverId, airStartBar){
    const div=state.divers.find(d=>d.id===diverId);
    const bar = validBar(airStartBar);
    const mdd = cleanMddValue(div?.defaultMdd, {clamp:true, fallback:6});
    const d = ensureAirFields({id:uid(), diverId, entryMode:"live", registrationType:"normal", dtMode:"auto", dtUsedMin:"", phases:[], start:"", ascentStart:"", surface:"", mdd, rule:"auto", daypart:"1", notes:"", signalHolder:"", airStartBar:bar == null ? "" : Math.round(bar), setNo:div?.setNo || "", maskNo:div?.maskNo || "", airCheckIntervalMin:airCheckIntervalForDepth(mdd)});
    stampField(d, "start", new Date());
    return d;
  }
  function newBlankLiveDive(){
    const diverId = firstActiveDiverId();
    const div = getDiver(diverId);
    return ensureAirFields({id:uid(), diverId, entryMode:"achteraf", registrationType:"normal", dtMode:"auto", dtUsedMin:"", phases:[], start:"", ascentStart:"", surface:"", mdd:cleanMddValue(div.defaultMdd,{clamp:true,fallback:6}), rule:"auto", daypart:"1", notes:"", signalHolder:"", setNo:div.setNo||"", maskNo:div.maskNo||""});
  }
  function latestActiveDive(diverId){ return [...state.live].reverse().find(d=>d.diverId===diverId && d.start && !d.surface); }
  // Een afgesloten duik (boven gemeld) waarvan de einddruk nog niet is vastgelegd
  // en die ook geen luchtmeting heeft om op terug te vallen. Dan moet de duiker
  // de einddruk van het toestel nog noteren.
  function latestDiveAwaitingEndBar(diverId){
    const d = [...state.live].reverse().find(x=>x.diverId===diverId && x.start && x.surface);
    if(!d) return null;
    if(validBar(d.airEndBar) != null) return null;
    const ms = airMeasurements(d);
    if(ms.length) return null;
    return d;
  }
  function startLiveDiveFor(diverId, airStartBar){
    const bar = validBar(airStartBar);
    const diver = getDiver(diverId);
    if(!isDiverActive(diver) || latestActiveDive(diverId) || bar == null) return false;
    state.live.push(newLiveDive(diverId, bar));
    return true;
  }
  function validBar(value){
    const n = parseNum(value);
    return Number.isFinite(n) && n > 0 && n <= MAX_BAR ? n : null;
  }
  function cleanBarValue(value){
    const n = validBar(value);
    return n == null ? "" : Math.round(n);
  }
  function airMeasurements(d){
    ensureAirFields(d);
    return d.airMeasurements
      .map((m,i)=>({originalIndex:i, time:dateFromTs(m.timeTs) || parseDT(m.time), bar:validBar(m.bar), depth:cleanAirDepthValue(m.depth)}))
      .filter(m=>m.time && m.bar != null)
      .sort((a,b)=>a.time-b.time);
  }
  function addAirMeasurement(d, bar, time=new Date(), depth=""){
    ensureAirFields(d);
    const n = validBar(bar);
    if(n == null) return false;
    const dt = time instanceof Date ? time : (parseDT(time) || new Date());
    const mdd = cleanActualAirDepthValue(depth);
    const item = {time:toLocalDTString(dt), timeTs:dt.getTime(), bar:Math.round(n)};
    if(mdd !== "") item.depth = mdd;
    d.airMeasurements.push(item);
    if(mdd !== "" && (!Number.isFinite(parseNum(d.mdd)) || mdd > parseNum(d.mdd))){
      d.mdd = mdd;
      updateAirCheckInterval(d);
    }
    return true;
  }
  function deleteLastAirMeasurement(d){
    const ms = airMeasurements(d);
    if(!ms.length) return false;
    d.airMeasurements.splice(ms[ms.length-1].originalIndex,1);
    return true;
  }
  function airAnalysis(d, now=new Date()){
    ensureAirFields(d);
    const start = readStampedDT(d, "start");
    const startBar = validBar(d.airStartBar);
    const ms = airMeasurements(d);
    const last = ms[ms.length-1] || null;
    const prev = ms.length >= 2 ? ms[ms.length-2] : null;
    let rateStart = null, rateLast = null;
    if(start && startBar != null && last){
      const mins = minsBetween(start,last.time);
      if(mins > 0) rateStart = (startBar - last.bar) / mins;
    }
    if(prev && last){
      const mins = minsBetween(prev.time,last.time);
      if(mins > 0) rateLast = (prev.bar - last.bar) / mins;
    }
    const candidates = [rateStart, rateLast].filter(x=>Number.isFinite(x) && x > 0);
    const rateBarMin = candidates.length ? Math.max(...candidates) : null;
    const rateLitersMin = rateBarMin == null ? null : rateBarMin * AIR_CYLINDER_LITERS;
    const remainingMin = (last && rateBarMin) ? Math.max(0, Math.floor((last.bar - AIR_STOP_BAR) / rateBarMin)) : null;
    const reference = last?.time || start;
    const checkIntervalMin = updateAirCheckInterval(d);
    let nextCheck = reference ? addMin(reference, checkIntervalMin) : null;
    let secondsToNext = nextCheck ? Math.round((nextCheck - now)/1000) : null;
    let overdue = secondsToNext != null && secondsToNext < 0;
    const elapsedLiveMin = start ? minsBetween(start, now) : null;
    const timerNeedsCheck = start && !d.surface && normalizeEntryMode(d.entryMode) === "live" && elapsedLiveMin > LIVE_TIMER_MAX_MIN;
    const messages = [];
    let cls = "neutral", label = "Nog geen meting";
    if(timerNeedsCheck){
      nextCheck = null;
      secondsToNext = null;
      overdue = false;
      cls = "warn";
      label = "Tijd controleren";
      messages.push("Actieve timer is langer dan 8 uur; controleer starttijd of zet de duik boven/einde.");
    }
    if(!start){ messages.push("Duik is nog niet gestart."); }
    if(!timerNeedsCheck && start && startBar == null){ messages.push("Begindruk invullen voor luchtbewaking."); cls="warn"; label="Begindruk nodig"; }
    if(!timerNeedsCheck && start && startBar != null && !last){
      label = overdue ? "Luchtmeting nodig" : "Wacht op eerste meting";
      cls = overdue ? "warn" : "neutral";
      messages.push(overdue ? "Eerste luchtmeting is verlopen." : `Voer de eerste luchtmeting rond ${checkIntervalMin} minuten in.`);
    }
    if(!timerNeedsCheck && last){
      if(startBar != null && last.bar > startBar) messages.push("Laatste druk is hoger dan begindruk; controleer invoer.");
      if(last.bar <= AIR_STOP_BAR){ cls="bad"; label="100 bar bereikt"; messages.push("100 bar bereikt of onderschreden."); }
      else if(rateBarMin == null){ cls="warn"; label="Trend onbekend"; messages.push("Nog geen bruikbare verbruikstrend."); }
      else if(remainingMin <= 5){ cls="bad"; label="Lucht kritiek"; messages.push(`Resterend tot 100 bar is ${remainingMin} min.`); }
      else if(remainingMin <= 10){ cls="warn"; label="Lucht beperkt"; messages.push(`Resterend tot 100 bar is ${remainingMin} min.`); }
      else if(overdue){ cls="warn"; label="Controle verlopen"; messages.push("Luchtmeting is verlopen; actuele druk controleren."); }
      else { cls="ok"; label="Lucht bewaakt"; }
    }
    return {start, startBar, measurements:ms, last, prev, rateStart, rateLast, rateBarMin, rateLitersMin, remainingMin, checkIntervalMin, nextCheck, secondsToNext, overdue, cls, label, messages, timerNeedsCheck, elapsedLiveMin};
  }
  function airNextText(a){
    if(!a.nextCheck) return "-";
    if(a.secondsToNext == null) return fmtTime(a.nextCheck);
    if(a.secondsToNext < 0) return `${fmtSecs(Math.abs(a.secondsToNext))} verlopen`;
    return `over ${fmtSecs(a.secondsToNext)}`;
  }
  function airMeasurementsRows(ms){
    if(!ms.length) return `<tr><td colspan="4">Nog geen lucht-/dieptemetingen.</td></tr>`;
    return ms.map((m,i)=>`<tr><td>${i+1}</td><td>${fmtTime(m.time)}</td><td>${fmtBar(m.bar)}</td><td>${Number.isFinite(m.depth) ? fmtDec(m.depth,1)+" m" : "-"}</td></tr>`).join("");
  }
  function airNextClass(a){

  function airInputAttentionClass(a){

  function airSummaryForUnit(unit){
    if(!unit || unit.dataset !== "live") return "";

    for(const e of unit.events){
      ensureAirFields(e);
      if(firstStartBar == null && validBar(e.airStartBar) != null) firstStartBar = validBar(e.airStartBar);
      for(const m of airMeasurements(e)) points.push({time:m.time, bar:m.bar, depth:m.depth});
    }
    points.sort((a,b)=>a.time-b.time);
    if(firstStartBar == null && !points.length) return "";

    const low = points.length ? Math.min(...points.map(p=>p.bar)) : null;
    const rows = points.map((p,i)=>`<tr><td>${i+1}</td><td>${fmtClockMinute(p.time)}</td><td>${fmtBar(p.bar)}</td><td>${Number.isFinite(p.depth) ? fmtDec(p.depth,1)+" m" : "-"}</td></tr>`).join("");

  function renderRepeatProjection(d, last){
    if(!last) return "";
    const prevHG = last.hgAdjusted || last.hgRaw;
    if(!prevHG || !last.surface) return "";
    const mdd = (last.mddMax != null ? last.mddMax : d.defaultMdd) || 6;
    const proj = repeatProjection(prevHG, last.surface, mdd);
    if(!proj) return "";
    const depthLabel = proj.depth ? `${proj.depth} m-tabel` : "diepte onbekend";
    let nowLine;
    if(proj.now.short){
      nowLine = `OI ${fmtDur(proj.oiNow)} · nog te kort voor herhalingsduik (onder 0:15)`;
    } else if(proj.now.empty){
      nowLine = `OI ${fmtDur(proj.oiNow)} · herhalingsduik nu niet toegestaan voor HG ${esc(prevHG)} (tabel leeg op dit interval)`;
    } else if(proj.now.hf == null){
      nowLine = `OI ${fmtDur(proj.oiNow)} · HF nu niet bepaald (${esc(proj.now.label)})`;
    } else {
      const ndl = proj.now.ndl != null ? `, NDL ${proj.now.ndl} min` : "";
      nowLine = `OI ${fmtDur(proj.oiNow)} · nu HF ${fmtHF(proj.now.hf)}${ndl} (${depthLabel})`;
    }
    const stepLines = proj.steps.map(s=>{
      const ndl = s.ndl != null ? `, NDL ${s.ndl} min` : "";
      return `<li>over ${fmtDur(s.minutesUntil)} (om ${fmtTime(s.at,false)}): HF ${fmtHF(s.hf)}${ndl}</li>`;
    });
    if(proj.reset){
      stepLines.push(`<li>over ${fmtDur(proj.reset.minutesUntil)} (om ${fmtTime(proj.reset.at,false)}): HF 1,0 (volledig hersteld)</li>`);
    }
    const body = stepLines.length ? `<ul class="messages">${stepLines.join("")}</ul>` : `<div class="hint">Geen verdere verbetering meer te verwachten.</div>`;
    return `<details class="airdetails" data-detail-key="repeat:${esc(d.id)}" ${openDetailKeys["repeat:"+d.id] ? "open" : ""}><summary>Herhalingsduik-vooruitblik</summary><div class="hint" style="margin-top:4px">${nowLine}</div>${body}<div class="hint small muted">Indicatief, op basis van laatste HG ${esc(prevHG)} en lopend oppervlakte-interval. Geen vervanging van tabel of DPL-oordeel.</div></details>`;
  }
  function renderLiveDiver(d, calc){

      <div class="bigbuttons no-print"><button class="good" data-live-start="${esc(d.id)}" ${startDisabled}>${active?'Duik loopt':'Start duik'}</button><button class="warn" data-live-ascent="${esc(d.id)}" ${ascentDisabled}>${active?.ascentStart?'Opkomst loopt':'Opkomst'}</button><button class="primary fullwidth" data-live-surface="${esc(d.id)}" ${surfaceDisabled}>Boven / einde</button></div>

      ${active ? renderAirBlock(active) : ""}
      ${!active ? renderRepeatProjection(d, last) : ""}
      ${last?.messages?.length ? `<ul class="messages">${last.messages.slice(0,3).map(m=>`<li>${esc(m)}</li>`).join("")}</ul>` : ""}
    </div>`;
  }
  function wireLiveButtons(){
    document.querySelectorAll("[data-default-mdd]").forEach(inp=>inp.onchange=()=>mutate(()=>{ const d=state.divers.find(x=>x.id===inp.dataset.defaultMdd); if(d){ const raw=parseNum(inp.value); const v=cleanMddValue(inp.value,{clamp:true,fallback:6}); if(Number.isFinite(raw) && raw>MAX_MDD) alert("Maximale duikdiepte is 15 m (no-deco tot 15 m). De waarde is teruggezet naar 15."); d.defaultMdd=v; inp.value=v; } }));

      if(n == null){ alert(`Vul eerst een geldige begindruk in (1-${MAX_BAR} bar).`); inp?.focus(); return; }

  function csvSafe(value){
    const text = String(value ?? "");
    return /^[=+\-@]/.test(text.trimStart()) ? "'" + text : text;
  }
  function csvCell(value){
    return `"${csvSafe(value).replace(/"/g,'""')}"`;
  }
  function exportRegistrationCsv(){
    const csv = registrationRowsForExport().map(r=>r.map(csvCell).join(";")).join("\n");
    downloadBlob(new Blob([csv],{type:"text/csv;charset=utf-8"}), `duikmonitor-duikrapport-${state.project.date||'export'}.csv`);
