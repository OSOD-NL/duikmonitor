name: Filter

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  controleren:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Node klaarzetten
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Geheimen scannen (gitleaks)
        shell: bash
        run: |
          set -euo pipefail

          scan_dir="$(mktemp -d)"
          trap 'rm -rf "$scan_dir"' EXIT

          # Scan de bestanden van de huidige commit, niet de git-geschiedenis.
          git archive --format=tar HEAD | tar -x -C "$scan_dir"

          docker run --rm \
            -v "$scan_dir:/repo:ro" \
            ghcr.io/gitleaks/gitleaks:v8.24.3 \
            dir --verbose --redact /repo

      - name: Persoonsgegevens scannen
        shell: bash
        run: |
          set -e
          FOUT=0
          # E-mailadressen
          if grep -RInE '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}' \
             --include='*.html' --include='*.md' --include='*.js' --include='*.css' . ; then
            echo "::error::E-mailadres aangetroffen."; FOUT=1
          fi
          # Telefoonnummers (NL, ruw maar zonder ISO-datums zoals 2026-05-23)
          TEL_MATCHES=$(grep -RInE '(^|[^0-9])((\+31[ -]?(6|[1-9][0-9])|0(6|[1-9][0-9]))[ -]?[0-9][0-9 -]{6,})([^0-9]|$)' \
             --include='*.html' --include='*.md' --include='*.js' . || true)
          if [ -n "${TEL_MATCHES}" ]; then
            echo "${TEL_MATCHES}"
            echo "::error::Mogelijk telefoonnummer aangetroffen."; FOUT=1
          fi
          # Namen uit een geheime lijst (komma-gescheiden in secret NAMES_BLOCKLIST)
          if [ -n "${NAMES_BLOCKLIST}" ]; then
            IFS=',' read -ra NAMEN <<< "${NAMES_BLOCKLIST}"
            for n in "${NAMEN[@]}"; do
              n="$(echo "$n" | xargs)"; [ -z "$n" ] && continue
              if grep -RIniF "$n" --include='*.html' --include='*.md' --include='*.js' . ; then
                echo "::error::Naam uit de blokkeerlijst aangetroffen."; FOUT=1
              fi
            done
          fi
          if [ "$FOUT" -ne 0 ]; then
            echo "Filter geblokkeerd: verwijder de gevonden gegevens en probeer opnieuw."
            exit 1
          fi
          echo "Geen persoonsgegevens gevonden."
        env:
          NAMES_BLOCKLIST: ${{ secrets.NAMES_BLOCKLIST }}

      - name: Sporen van hulpmiddelen en dev-omgevingen scannen
        shell: bash
        run: |
          set -e
          # Verboden sporen in publieke bestanden: namen van AI-hulpmiddelen,
          # auteurschap-trailers en dev- of preview-URL's.
          PATROON='chatgpt|chat\.openai|openai|codex|copilot|anthropic|claude|co-authored-by|generated by|generated with|gegenereerd door|pages\.dev|workers\.dev|wrangler'
          if grep -RIniE "${PATROON}" \
             --include='*.html' --include='*.md' --include='*.js' --include='*.css' . ; then
            echo "::error::Spoor van een hulpmiddel of dev-omgeving aangetroffen. Verwijder het en probeer opnieuw."
            exit 1
          fi
          echo "Geen sporen van hulpmiddelen of dev-omgevingen gevonden."

      - name: JavaScript-syntax controleren
        shell: bash
        run: |
          set -e
          # Inline script uit index.html halen en op syntaxfouten controleren
          awk 'f{ if($0 ~ /<\/script>/){exit} print } /<script>/{f=1}' index.html > /tmp/app.js
          node --check /tmp/app.js
          echo "JavaScript is syntactisch in orde."

      - name: Zelftests draaien
        shell: bash
        run: |
          set -e
          node scripts/run-selftests-node.js

      - name: Release-checksum controleren
        shell: bash
        run: |
          set -e
          sha256sum -c CHECKSUMS.sha256

      - name: Themakleuren-lint (geen ruwe kleuren buiten tokens)
        shell: bash
        run: |
          set -e
          node scripts/check-theme-colors.js
